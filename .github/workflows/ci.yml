name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # MediaPipe (required) ships wheels for 3.12
      - name: Install (core + dev)
        run: pip install -e ".[dev]"
      - name: Run tests (offline, mock generator)
        run: pytest tests -q
      - name: Generate the demo artifacts (smoke)
        run: python examples/make_example.py
